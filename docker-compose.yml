version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: byteroom-postgres
    environment:
      POSTGRES_USER: byteroom
      POSTGRES_PASSWORD: byteroom_dev
      POSTGRES_DB: byteroom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byteroom"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: byteroom-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@byteroom.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
